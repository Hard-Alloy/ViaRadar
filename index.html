<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViaRadar MVP</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <img
        class="brand-logo"
        src="./Viamericas_logo_fullcolor_2025.png"
        alt="Viamericas"
      />
      <div class="header-copy">
        <div class="eyebrow">ViaRadar</div>
        <h1>Next Best Action for the Agency</h1>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="page-intro">
      <p class="intro-text">
        ViaRadar reads repo-based transaction data and surfaces the next best action for each agency.
      </p>
      <p class="route-hint">
        Static-safe routes:
        <code>/?view=agency&amp;branchId=A07667</code>
        and
        <code>/?view=bde</code>
      </p>
    </section>

    <section class="status-panel">
      <div id="csvStatus" class="csv-status" aria-live="polite"></div>
    </section>

    <section id="app" class="app-shell">
      <!-- Agency portal or BDE portal will render here -->
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
